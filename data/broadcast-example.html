<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard Monitor Broadcast Example</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: rgba(0, 0, 0, 0);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            pointer-events: none;
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #status {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 0.9rem;
            opacity: 0.4;
            color: #888;
        }

        .floating-key {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            padding: 15px 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 3rem;
            font-weight: 800;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            animation: floatUp 2s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
            white-space: nowrap;
        }

        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(50px) scale(0.8) rotate(-5deg);
            }
            20% {
                opacity: 1;
                transform: translateY(0) scale(1) rotate(0deg);
            }
            80% {
                opacity: 1;
                transform: translateY(-50px) scale(1.1);
            }
            100% {
                opacity: 0;
                transform: translateY(-150px) scale(1.2) rotate(5deg);
            }
        }

        .modifier {
            color: #00d2ff;
        }
    </style>
</head>

<body>
    <div id="status">Waiting for Keyboard Monitor data...</div>
    <div id="container"></div>

    <script>
        const container = document.getElementById('container');
        const statusEl = document.getElementById('status');
        const keyChannel = new BroadcastChannel('keyboard-monitor-keys');

        keyChannel.onmessage = (e) => {
            statusEl.style.display = 'none';
            createFloatingKey(e.data);
        };

        function createFloatingKey(combo) {
            const el = document.createElement('div');
            el.className = 'floating-key';
            
            // Highlight modifiers if any
            const parts = combo.split(' + ');
            el.innerHTML = parts.map(p => {
                const isModifier = ['Ctrl', 'Alt', 'Shift', 'Cmd', 'Win', 'Option', 'Control', 'Command'].includes(p);
                return isModifier ? `<span class="modifier">${p}</span>` : p;
            }).join(' + ');

            // Random horizontal position
            const x = 30 + Math.random() * 40; // 30% to 70%
            el.style.left = `${x}vw`;
            el.style.top = `${40 + Math.random() * 20}vh`;

            container.appendChild(el);

            // Remove element after animation
            setTimeout(() => {
                el.remove();
            }, 2000);
        }

        // Also listen for direct events if this page is used as a standalone source
        window.addEventListener('keyboard_monitor_input', (event) => {
            let data = event.detail;
            if (typeof data === 'string') {
                try { data = JSON.parse(data); } catch (e) { return; }
            }
            if (data && data.key_combination) {
                statusEl.style.display = 'none';
                createFloatingKey(data.key_combination);
            }
        });

        console.log('Broadcast Example ready');
    </script>
</body>

</html>
